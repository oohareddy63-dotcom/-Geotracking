services:
  # Backend + Frontend (Full Stack on one service)
  - type: web
    name: geotracking-app
    env: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: cd client1 && npm install && npm run build && cd ../server && npm install
    startCommand: node server/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false   # Set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set this manually in Render dashboard
